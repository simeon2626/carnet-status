<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Статуси на карнети — ВиК Плевен</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      background: #1a3a5c;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      flex: 1 1 auto;
    }
    #last-updated {
      font-size: 0.82rem;
      opacity: 0.8;
    }
    #refresh-btn {
      background: #fff;
      color: #1a3a5c;
      border: none;
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #refresh-btn:hover { background: #d0e4f7; }

    /* ── Legend ───────────────────────────────────────────── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 20px;
      padding: 10px 24px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      font-size: 0.82rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 18px; height: 18px;
      border-radius: 4px;
      border: 1px solid #aaa;
      flex-shrink: 0;
    }

    /* ── Today banner ─────────────────────────────────────── */
    #today-banner {
      padding: 6px 24px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      background: #eaf1fb;
      border-bottom: 1px solid #c8d8ec;
    }

    /* ── Grid wrapper ─────────────────────────────────────── */
    .grid-wrapper {
      padding: 16px 12px 32px;
      overflow-x: auto;
    }

    /* ── 5-column grid ────────────────────────────────────── */
    .carnet-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(90px, 1fr));
      gap: 6px;
      min-width: 480px;
    }

    /* ── Carnet card ──────────────────────────────────────── */
    .carnet-card {
      border-radius: 6px;
      border: 1px solid #aaa;
      padding: 6px 4px 5px;
      text-align: center;
      cursor: default;
      transition: transform 0.12s, box-shadow 0.12s;
      position: relative;
    }
    .carnet-card:hover {
      transform: scale(1.07);
      box-shadow: 0 3px 10px rgba(0,0,0,.18);
      z-index: 10;
    }

    /* Status colours */
    .status-completed_today { background: #90EE90; }
    .status-completed_prev  { background: #E0FFE0; }
    .status-expected        { background: #FFB6C1; }
    .status-upcoming        { background: #f5f5f5; }
    .status-no_schedule     { background: #D3D3D3; }

    .carnet-number {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.2;
    }
    .carnet-number.bold { font-weight: 800; }

    .carnet-person {
      font-size: 0.75rem;
      color: #444;
      margin-top: 2px;
      white-space: normal;
      word-break: break-word;
      line-height: 1.25;
    }

    /* ── Tooltip ──────────────────────────────────────────── */
    #tt {
      position: fixed;
      background: #333;
      color: #fff;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      white-space: pre-line;
      min-width: 160px;
      max-width: 260px;
      z-index: 9999;
      pointer-events: none;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
      display: none;
    }

    /* ── Error / Loading ──────────────────────────────────── */
    #status-message {
      padding: 16px 24px;
      font-size: 1rem;
      color: #c00;
    }
    #loading {
      padding: 30px 24px;
      font-size: 1rem;
      color: #555;
    }

    /* ── Schedule section ────────────────────────────────── */
    .schedule-section {
      padding: 24px 16px 40px;
      max-width: 900px;
    }
    .schedule-section h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a3a5c;
      margin-bottom: 14px;
      letter-spacing: 0.02em;
    }
    .emp-select-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .emp-select-wrap label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #444;
      white-space: nowrap;
    }
    #emp-select {
      flex: 1;
      max-width: 380px;
      padding: 8px 12px;
      border: 1px solid #c0cfe0;
      border-radius: 8px;
      font-size: 0.95rem;
      background: #fff;
      color: #222;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #emp-select:focus {
      border-color: #1a3a5c;
      box-shadow: 0 0 0 3px rgba(26,58,92,.12);
    }

    /* Removed-carnets notice */
    #removed-carnets-box {
      display: none;
      background: #fff8e1;
      border-left: 4px solid #f5a623;
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: 0.82rem;
      color: #555;
      line-height: 1.7;
    }
    #removed-carnets-box strong {
      color: #333;
      display: block;
      margin-bottom: 4px;
    }

    /* Schedule table */
    .sched-table-wrap {
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.09);
    }
    #sched-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      font-size: 0.9rem;
    }
    #sched-table thead tr {
      background: #1a3a5c;
      color: #fff;
    }
    #sched-table thead th {
      padding: 10px 14px;
      text-align: center;
      font-weight: 600;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    #sched-table thead th:first-child { text-align: center; }
    #sched-table tbody tr {
      border-bottom: 1px solid #eef0f3;
      transition: background 0.12s;
    }
    #sched-table tbody tr:last-child { border-bottom: none; }
    #sched-table tbody tr:hover { background: #f0f6ff; cursor: default; }
    #sched-table td {
      padding: 9px 14px;
      text-align: center;
      color: #333;
    }
    #sched-table td:first-child {
      font-weight: 700;
      font-size: 1rem;
      color: #1a3a5c;
    }
    #sched-table td.titular-cell {
      font-style: italic;
      color: #777;
      font-size: 0.82rem;
    }
    #sched-table td.date-cell { color: #555; }
    #sched-empty {
      text-align: center;
      color: #aaa;
      padding: 24px;
      font-size: 0.9rem;
    }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 540px) {
      .carnet-number { font-size: 0.88rem; }
      .carnet-person  { display: none; }
      #emp-select { max-width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <h1>Статуси на карнети — ВиК Плевен</h1>
  <span id="last-updated">Зарежда се…</span>
  <button id="refresh-btn" onclick="loadData()">⟳ Обнови</button>
</header>

<!-- Legend -->
<div class="legend">
  <div class="legend-item">
    <div class="legend-dot" style="background:#90EE90;"></div>
    <span>Изтеглен днес</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#E0FFE0;"></div>
    <span>Изтеглен предходен ден</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#FFB6C1;"></div>
    <span>Готов / Очакван</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#f5f5f5;"></div>
    <span>Предстоящ</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#D3D3D3;"></div>
    <span>Без график</span>
  </div>
</div>

<div id="today-banner">Дата: —</div>

<div id="tt"></div>
<div id="loading">Зарежда данни…</div>
<div id="status-message"></div>
<div class="grid-wrapper" id="grid-wrapper" style="display:none;">
  <div class="carnet-grid" id="carnet-grid"></div>
</div>

<!-- Schedule section -->
<div class="schedule-section" id="schedule-section" style="display:none;">
  <h2>График по служител</h2>
  <div class="emp-select-wrap">
    <label for="emp-select">Служител:</label>
    <select id="emp-select"><option value="">— изберете —</option></select>
  </div>
  <div id="removed-carnets-box"></div>
  <div class="sched-table-wrap">
    <table id="sched-table">
      <thead>
        <tr>
          <th>Карнет</th>
          <th>От дата</th>
          <th>До дата</th>
          <th>Титуляр</th>
        </tr>
      </thead>
      <tbody id="sched-tbody"></tbody>
    </table>
  </div>
</div>

<script>
  /* ── Custom layout overrides ──────────────────────────── */
  // Карнети, които НЕ се показват в решетката
  const EXCLUDED_CARNETS = new Set([9100, 9200, 9600]);
  // Празни слотове: { колона (0-base): [карнет преди който се вмъква празнина] }
  const EMPTY_BEFORE = {
    2: [4603],   // колона …3/…8 → празна позиция преди 4603
  };

  /* ── Column label map ─────────────────────────────────── */
  const COL_LABELS = ['…1 / …6', '…2 / …7', '…3 / …8', '…4 / …9', '…5 / …0'];

  /* ── Status label map ─────────────────────────────────── */
  const STATUS_LABELS = {
    completed_today: 'Изтеглен днес',
    completed_prev:  'Изтеглен предходен ден',
    expected:        'Готов / Очакван',
    upcoming:        'Предстоящ',
    no_schedule:     'Без график',
  };

  /* ── Main load function ───────────────────────────────── */
  async function loadData() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('grid-wrapper').style.display = 'none';
    document.getElementById('status-message').textContent = '';

    try {
      const url = 'status.json?t=' + Date.now();
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      renderGrid(data);
    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('status-message').textContent =
        'Грешка при зареждане на данните: ' + err.message;
    }
  }

  /* ── Employees data store ────────────────────────────── */
  let _employees = [];

  /* ── Render ───────────────────────────────────────────── */
  function renderGrid(data) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('last-updated').textContent = 'Обновено: ' + (data.updated_at || '—');
    document.getElementById('today-banner').textContent = 'Дата: ' + (data.today || '—');

    // Build column buckets  [col0..col4]
    const cols = [[], [], [], [], []];
    (data.carnets || []).forEach(c => {
      if (EXCLUDED_CARNETS.has(c.numero)) return;   // skip excluded
      const col = (c.column >= 0 && c.column <= 4) ? c.column : 0;
      cols[col].push(c);
    });

    // Sort each column numerically
    cols.forEach(col => col.sort((a, b) => a.numero - b.numero));

    // Insert empty placeholders (null = empty visual slot)
    Object.entries(EMPTY_BEFORE).forEach(([colIdx, beforeList]) => {
      const col = cols[parseInt(colIdx)];
      beforeList.forEach(targetNumero => {
        const pos = col.findIndex(c => c && c.numero === targetNumero);
        if (pos !== -1) col.splice(pos, 0, null);
      });
    });

    const maxRows = Math.max(...cols.map(c => c.length));

    const grid = document.getElementById('carnet-grid');
    grid.innerHTML = '';

    // Cards row by row
    for (let ri = 0; ri < maxRows; ri++) {
      for (let ci = 0; ci < 5; ci++) {
        const carnet = cols[ci][ri];
        if (!carnet) {
          grid.appendChild(document.createElement('div')); // empty cell
          continue;
        }

        const card = document.createElement('div');
        card.className = 'carnet-card status-' + (carnet.status || 'no_schedule');

        // Tooltip
        const tooltipParts = [];
        if (carnet.titular)    tooltipParts.push('Титуляр: ' + carnet.titular);
        if (carnet.incasator)  tooltipParts.push('Отчита: '  + carnet.incasator);
        if (carnet.date_from)  tooltipParts.push('Период: '  + carnet.date_from + ' – ' + carnet.date_to);
        tooltipParts.push('Статус: ' + (STATUS_LABELS[carnet.status] || carnet.status));
        card.setAttribute('data-tooltip', tooltipParts.join('\n'));

        // Number
        const numEl = document.createElement('div');
        numEl.className = 'carnet-number';
        numEl.textContent = carnet.numero;
        card.appendChild(numEl);

        // Person (incasator or titular)
        const person = carnet.incasator || carnet.titular;
        if (person) {
          const personEl = document.createElement('div');
          personEl.className = 'carnet-person';
          personEl.textContent = person;
          card.appendChild(personEl);
        }

        grid.appendChild(card);
      }
    }

    document.getElementById('grid-wrapper').style.display = 'block';

    // Populate employee dropdown
    _employees = data.employees || [];
    renderEmployeeDropdown(_employees);
  }

  /* ── Employee dropdown ────────────────────────────────── */
  function renderEmployeeDropdown(employees) {
    const sel = document.getElementById('emp-select');
    const prev = sel.value;
    sel.innerHTML = '<option value="">— изберете —</option>';

    employees.forEach((emp, idx) => {
      const opt = document.createElement('option');
      opt.value = idx;
      opt.textContent = emp.name + (emp.type ? ' (' + emp.type + ')' : '');
      sel.appendChild(opt);
    });

    // Restore previous selection if still valid
    if (prev !== '' && sel.options[parseInt(prev) + 1]) {
      sel.value = prev;
    }

    const section = document.getElementById('schedule-section');
    section.style.display = employees.length ? 'block' : 'none';

    renderScheduleTable();
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('emp-select').addEventListener('change', renderScheduleTable);
  });
  // Also attach immediately in case DOMContentLoaded already fired
  const _selEl = document.getElementById('emp-select');
  if (_selEl) _selEl.addEventListener('change', renderScheduleTable);

  /* ── Schedule table ───────────────────────────────────── */
  function renderScheduleTable() {
    const sel   = document.getElementById('emp-select');
    const tbody = document.getElementById('sched-tbody');
    const rcBox = document.getElementById('removed-carnets-box');

    tbody.innerHTML = '';
    rcBox.style.display = 'none';
    rcBox.innerHTML = '';

    const idx = sel.value;
    if (idx === '' || !_employees[idx]) return;

    const emp = _employees[idx];

    // Removed-carnets tooltip box
    if (emp.removed_carnets && emp.removed_carnets.length > 0) {
      let html = '<strong>Премахнати карнети от графика на титуляра:</strong>';
      emp.removed_carnets.forEach(rc => {
        html += rc.numero + ': ' + rc.employee + '<br>';
      });
      rcBox.innerHTML = html;
      rcBox.style.display = 'block';
    }

    // Table rows
    const tableWrap = document.querySelector('.sched-table-wrap');
    if (!emp.schedule || emp.schedule.length === 0) {
      tableWrap.style.display = 'none';
      return;
    }
    tableWrap.style.display = '';

    emp.schedule.forEach(row => {
      const tr = document.createElement('tr');

      const tdNum = document.createElement('td');
      tdNum.textContent = row.numero;
      tr.appendChild(tdNum);

      const tdFrom = document.createElement('td');
      tdFrom.className = 'date-cell';
      tdFrom.textContent = row.date_from || '—';
      tr.appendChild(tdFrom);

      const tdTo = document.createElement('td');
      tdTo.className = 'date-cell';
      tdTo.textContent = row.date_to || '—';
      tr.appendChild(tdTo);

      const tdTit = document.createElement('td');
      tdTit.className = 'titular-cell';
      tdTit.textContent = row.titular || '';
      tr.appendChild(tdTit);

      tbody.appendChild(tr);
    });
  }

  /* ── Tooltip logic ────────────────────────────────────── */
  const tt = document.getElementById('tt');
  const MARGIN = 8; // px gap between card and tooltip

  document.addEventListener('mouseover', e => {
    const card = e.target.closest('[data-tooltip]');
    if (!card) return;
    tt.textContent = card.dataset.tooltip;
    tt.style.display = 'block';
    positionTooltip(card);
  });

  document.addEventListener('mouseout', e => {
    const card = e.target.closest('[data-tooltip]');
    if (!card) return;
    tt.style.display = 'none';
  });

  function positionTooltip(card) {
    const r   = card.getBoundingClientRect();
    const ttH = tt.offsetHeight;
    const ttW = tt.offsetWidth;
    const vw  = window.innerWidth;

    // Prefer above; flip below if not enough room
    let top;
    if (r.top - ttH - MARGIN >= 0) {
      top = r.top - ttH - MARGIN;   // above
    } else {
      top = r.bottom + MARGIN;       // below
    }

    // Horizontally center on card, clamp to viewport
    let left = r.left + r.width / 2 - ttW / 2;
    left = Math.max(MARGIN, Math.min(left, vw - ttW - MARGIN));

    tt.style.top  = top  + 'px';
    tt.style.left = left + 'px';
  }

  /* ── Boot ─────────────────────────────────────────────── */
  loadData();

  // Auto-refresh every 10 minutes
  setInterval(loadData, 10 * 60 * 1000);
</script>
</body>
</html>
