<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Статуси на карнети — ВиК Плевен</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      background: #1a3a5c;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      flex: 1 1 auto;
    }
    #last-updated {
      font-size: 0.82rem;
      opacity: 0.8;
    }
    #refresh-btn {
      background: #fff;
      color: #1a3a5c;
      border: none;
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #refresh-btn:hover { background: #d0e4f7; }

    /* ── Legend ───────────────────────────────────────────── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 20px;
      padding: 10px 24px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      font-size: 0.82rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 18px; height: 18px;
      border-radius: 4px;
      border: 1px solid #aaa;
      flex-shrink: 0;
    }

    /* ── Today banner ─────────────────────────────────────── */
    #today-banner {
      padding: 6px 24px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      background: #eaf1fb;
      border-bottom: 1px solid #c8d8ec;
    }

    /* ── Grid wrapper ─────────────────────────────────────── */
    .grid-wrapper {
      padding: 16px 12px 32px;
      overflow-x: auto;
    }

    /* ── 5-column grid ────────────────────────────────────── */
    .carnet-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(90px, 1fr));
      gap: 6px;
      min-width: 480px;
    }

    /* ── Carnet card ──────────────────────────────────────── */
    .carnet-card {
      border-radius: 6px;
      border: 1px solid #aaa;
      padding: 6px 4px 5px;
      text-align: center;
      cursor: default;
      transition: transform 0.12s, box-shadow 0.12s;
      position: relative;
    }
    .carnet-card:hover {
      transform: scale(1.07);
      box-shadow: 0 3px 10px rgba(0,0,0,.18);
      z-index: 10;
    }

    /* Status colours */
    .status-completed_today { background: #90EE90; }
    .status-completed_prev  { background: #E0FFE0; }
    .status-expected        { background: #FFB6C1; }
    .status-upcoming        { background: #f5f5f5; }
    .status-no_schedule     { background: #D3D3D3; }

    .carnet-number {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.2;
    }
    .carnet-number.bold { font-weight: 800; }

    .carnet-person {
      font-size: 0.75rem;
      color: #444;
      margin-top: 2px;
      white-space: normal;
      word-break: break-word;
      line-height: 1.25;
    }

    /* ── Tooltip ──────────────────────────────────────────── */
    .carnet-card[data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      white-space: pre-line;
      min-width: 160px;
      max-width: 260px;
      z-index: 100;
      pointer-events: none;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }

    /* ── Error / Loading ──────────────────────────────────── */
    #status-message {
      padding: 16px 24px;
      font-size: 1rem;
      color: #c00;
    }
    #loading {
      padding: 30px 24px;
      font-size: 1rem;
      color: #555;
    }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 540px) {
      .carnet-number { font-size: 0.88rem; }
      .carnet-person  { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>Статуси на карнети — ВиК Плевен</h1>
  <span id="last-updated">Зарежда се…</span>
  <button id="refresh-btn" onclick="loadData()">⟳ Обнови</button>
</header>

<!-- Legend -->
<div class="legend">
  <div class="legend-item">
    <div class="legend-dot" style="background:#90EE90;"></div>
    <span>Изтеглен днес</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#E0FFE0;"></div>
    <span>Изтеглен предходен ден</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#FFB6C1;"></div>
    <span>Готов / Очакван</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#f5f5f5;"></div>
    <span>Предстоящ</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#D3D3D3;"></div>
    <span>Без график</span>
  </div>
</div>

<div id="today-banner">Дата: —</div>

<div id="loading">Зарежда данни…</div>
<div id="status-message"></div>
<div class="grid-wrapper" id="grid-wrapper" style="display:none;">
  <div class="carnet-grid" id="carnet-grid"></div>
</div>

<script>
  /* ── Column label map ─────────────────────────────────── */
  const COL_LABELS = ['…1 / …6', '…2 / …7', '…3 / …8', '…4 / …9', '…5 / …0'];

  /* ── Status label map ─────────────────────────────────── */
  const STATUS_LABELS = {
    completed_today: 'Изтеглен днес',
    completed_prev:  'Изтеглен предходен ден',
    expected:        'Готов / Очакван',
    upcoming:        'Предстоящ',
    no_schedule:     'Без график',
  };

  /* ── Main load function ───────────────────────────────── */
  async function loadData() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('grid-wrapper').style.display = 'none';
    document.getElementById('status-message').textContent = '';

    try {
      const url = 'status.json?t=' + Date.now();
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      renderGrid(data);
    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('status-message').textContent =
        'Грешка при зареждане на данните: ' + err.message;
    }
  }

  /* ── Render ───────────────────────────────────────────── */
  function renderGrid(data) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('last-updated').textContent = 'Обновено: ' + (data.updated_at || '—');
    document.getElementById('today-banner').textContent = 'Дата: ' + (data.today || '—');

    // Build column buckets  [col0..col4]
    const cols = [[], [], [], [], []];
    (data.carnets || []).forEach(c => {
      const col = (c.column >= 0 && c.column <= 4) ? c.column : 0;
      cols[col].push(c);
    });

    // Sort each column numerically
    cols.forEach(col => col.sort((a, b) => a.numero - b.numero));

    const maxRows = Math.max(...cols.map(c => c.length));

    const grid = document.getElementById('carnet-grid');
    grid.innerHTML = '';

    // Cards row by row
    for (let ri = 0; ri < maxRows; ri++) {
      for (let ci = 0; ci < 5; ci++) {
        const carnet = cols[ci][ri];
        if (!carnet) {
          grid.appendChild(document.createElement('div')); // empty cell
          continue;
        }

        const card = document.createElement('div');
        card.className = 'carnet-card status-' + (carnet.status || 'no_schedule');

        // Tooltip
        const tooltipParts = [];
        if (carnet.titular)    tooltipParts.push('Титуляр: ' + carnet.titular);
        if (carnet.incasator)  tooltipParts.push('Отчита: '  + carnet.incasator);
        if (carnet.date_from)  tooltipParts.push('Период: '  + carnet.date_from + ' – ' + carnet.date_to);
        tooltipParts.push('Статус: ' + (STATUS_LABELS[carnet.status] || carnet.status));
        card.setAttribute('data-tooltip', tooltipParts.join('\n'));

        // Number
        const numEl = document.createElement('div');
        numEl.className = 'carnet-number';
        numEl.textContent = carnet.numero;
        card.appendChild(numEl);

        // Person (incasator or titular)
        const person = carnet.incasator || carnet.titular;
        if (person) {
          const personEl = document.createElement('div');
          personEl.className = 'carnet-person';
          personEl.textContent = person;
          card.appendChild(personEl);
        }

        grid.appendChild(card);
      }
    }

    document.getElementById('grid-wrapper').style.display = 'block';
  }

  /* ── Boot ─────────────────────────────────────────────── */
  loadData();

  // Auto-refresh every 10 minutes
  setInterval(loadData, 10 * 60 * 1000);
</script>
</body>
</html>
